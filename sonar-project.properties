# SonarQube / SonarCloud — match sonar.projectKey to your SonarQube project
sonar.projectKey=comp231-inventory-devops
sonar.projectName=COMP231 Inventory (DevOps)
sonar.sourceEncoding=UTF-8

# Application sources (Node/React monorepo)
sonar.sources=server/src,client/src
sonar.tests=server/tests,client/src/__tests__

# Keep test files out of sonar.sources to avoid duplicate indexing.
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.config.js,client/src/__tests__/**

# Vitest v8 coverage (generated by `npm run test:coverage` in each package)
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info,client/coverage/lcov.info
